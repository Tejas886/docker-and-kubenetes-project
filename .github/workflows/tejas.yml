name: deployment of k8s and docker #giving a name 

on:
  push:
    branches:
      - master 

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: cloning the code 
        uses: actions/checkout@v3 

      - name: login to docker 
        uses: docker/login-action@v2 
        with: #input to actions 
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}


      - name: building a docker image
        uses: docker/build-push-action@v3
        with:
          context: ./src  #from current 
          push: true
          tags: |
            tejasgowramma123/image1:latest
            tejasgowramma123/image1:${{ github.sha }}
            tejasgowramma123/image1:${{ github.run_number }} 
           
      - name: installing of kubenetes
        uses: azure/setup-kubectl@v3 


      - name: Start minikube
        uses: medyagh/setup-minikube@master

      - name: verify the cluster
        run: kubectl get nodes
     

      - name: deployment of kubenetes 
        run: kubectl apply -f ./src deployment.yml
         
      - name: checking the pods 
        run: kubectl get pods
